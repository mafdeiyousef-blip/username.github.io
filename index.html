<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sarah Emil | Graphic Designer</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:#020617;
}

.logo{
font-size:22px;
font-weight:bold;
color:#a855f7;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:52px;
}

.hero p{
color:#cbd5f5;
}

.btn{
background:#a855f7;
padding:12px 25px;
border-radius:6px;
color:white;
text-decoration:none;
display:inline-block;
margin-top:20px;
}

.section{
padding:80px 60px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
margin-top:40px;
}

.grid img{
width:100%;
border-radius:12px;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.grid img:hover{
transform:scale(1.05);
}

video{
width:100%;
border-radius:12px;
}

footer{
text-align:center;
padding:30px;
background:#020617;
margin-top:50px;
}

</style>

</head>

<body>

<header>

<div class="logo">Sarah Emil</div>

<nav>

<a href="#">Home</a>
<a href="#designs">Designs</a>
<a href="#videos">Videos</a>
<a href="#branding">Branding</a>
<a href="#contact">Contact</a>

</nav>

</header>

<section class="hero">

<h1>Graphic Designer</h1>

<p>Creative social media designs, branding, and visual content</p>

<a class="btn" href="https://www.behance.net/sarahemil1">
View My Behance
</a>

</section>

<section class="section" id="designs">

<h2>Designs</h2>

<div class="grid">

<img src="design1.png">
<img src="design2.png">

</div>

</section>

<section class="section" id="videos">

<h2>Videos & Reels</h2>

<div class="grid">

<video controls>
<source src="video1.mp4" type="video/mp4">
</video>

</div>

</section>

<section class="section" id="branding">

<h2>Branding Projects</h2>

<div class="grid">

<img src="brand1.jpg">

</div>

</section>

<section class="section" id="contact">

<h2>Contact Me</h2>

<a class="btn" href="https://www.behance.net/sarahemil1">
Behance
</a>

</section>

<footer>

<p>© 2026 Sarah Emil | Graphic Designer</p>

</footer>

</body>
</html>
